name: Prune Wolfi APK Index

on:
  workflow_dispatch: null
  schedule:
    - cron: 0 3 1 * *

permissions:
  contents: read

concurrency:
  group: apk-index
  cancel-in-progress: false
  queue: max

env:
  RETENTION_DAYS: "180"

jobs:
  prune:
    if: github.repository == 'glimmer-labs/wolfi'
    strategy:
      matrix:
        arch:
          - x86_64
          - aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: |
            [r2]
            type = s3
            provider = Cloudflare
            env_auth = true
            region = auto
            endpoint = ${{ secrets.R2_ENDPOINT }}
          disable_base64: true

      - uses: glimmer-labs/wolfi/.github/actions/setup-melange@main

      - name: Get signing key
        run: echo "${{ secrets.SIGNING_KEY }}" > glimmer-labs-signing.rsa

      - uses: actions/setup-python@v6

      - name: Install packaging module
        run: pip install packaging

      - name: Prune stale APKs
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ${{ matrix.arch }}

          rclone copyto "r2:wolfi/${{ matrix.arch }}/APKINDEX.tar.gz" "${{ matrix.arch }}/APKINDEX.tar.gz" --log-level INFO

          python .github/scripts/prune_apk_repo.py \
              --index "${{ matrix.arch }}/APKINDEX.tar.gz" \
              --output-dir "." \
              --keep-days "$RETENTION_DAYS" \
              --arch "${{ matrix.arch }}"

          if [[ ! -s "./delete.txt" ]]; then
            echo "${{ matrix.arch }}: no packages eligible for deletion"
            exit 0
          fi

          echo "uploading delete.txt to registry for next month deletion"
          time="$(date +'%Y-%m-%s')"
          rclone copyto "./delete.txt" "r2:wolfi/package-removal/${{ matrix.arch }}-${time}.txt" --log-level INFO

          echo "signing refreshed APKINDEX"
          melange sign-index ${{ matrix.arch }}/APKINDEX.tar.gz --signing-key glimmer-labs-signing.rsa

          echo "uploading refreshed APKINDEX"
          rclone copyto "${{ matrix.arch }}/APKINDEX.tar.gz" "r2:wolfi/${{ matrix.arch }}/APKINDEX.tar.gz" \
              --log-level INFO \
              --header-upload 'Cache-Control: public, max-age=360'

      - name: Purge cache
        uses: jakejarvis/cloudflare-purge-action@master
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          PURGE_URLS: '["https://wolfi.glimmerlabs.dev/${{ matrix.arch }}/APKINDEX.tar.gz"]'
          
      - name: Add GitHub Action summary
        run: |
          month="$(date +'%B')"
          year="$(date +'%Y')"
          deletion_date="$(date -d "$(date +%Y-%m-01) +1 month" +'%B %-d, %Y')"

          {
            echo "# Glimmer Labs Package Removal List - ${month} ${year}"
            echo
            echo "The following packages have been removed from the package index because newer versions have been available for more than **6 months**."
            echo
            echo "This cleanup is performed automatically each month."
            echo
            echo "Although these packages are no longer listed in the index, they will remain available for download from the registry until **${deletion_date}**."
            echo
            echo "<details>"
            echo "<summary><strong>Removed packages ($(wc -l < ./delete.txt))</strong></summary>"
            echo
            echo '```text'
            cat ./delete.txt
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
